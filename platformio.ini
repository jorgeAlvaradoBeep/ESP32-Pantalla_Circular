; ============================================================================
; platformio.ini — ESP32-S3 + pantalla circular GC9A01 (240x240)
; Reproductor de video MJPEG descargado por WiFi a PSRAM.
; ============================================================================

[platformio]
; El código vive en Tostatronic/Tostatronic.ino (formato sketch de Arduino IDE).
; PlatformIO compila .ino sin problema apuntando src_dir a esa carpeta.
src_dir = Tostatronic

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
; Filtro útil para ver los backtraces decodificados si hay un crash
monitor_filters = esp32_exception_decoder

; ---------------------------------------------------------------------------
; PSRAM
; ---------------------------------------------------------------------------
; -DBOARD_HAS_PSRAM habilita el soporte de PSRAM (ps_malloc, etc.)
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1

; IMPORTANTE: el tipo de memoria depende de tu módulo concreto:
;   - ESP32-S3-WROOM-1 N16R8 / N8R8 (PSRAM octal, lo más común hoy): qio_opi
;   - Módulos antiguos con PSRAM quad (R2):                          qio_qspi
; Si la PSRAM no se detecta ("PSRAM no encontrada" en Serial), cambia esta línea.
board_build.arduino.memory_type = qio_opi

; Tamaño de flash (ajusta a tu módulo: 4MB / 8MB / 16MB)
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv

; ---------------------------------------------------------------------------
; Librerías
; ---------------------------------------------------------------------------
lib_deps =
    moononournation/GFX Library for Arduino@^1.6.6
    bitbank2/JPEGDEC@^1.6.2
